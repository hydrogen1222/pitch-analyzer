name: "publish"
on:
  push:
    tags:
      - "v*" # 当你推送形如 v0.1.0 的标签时触发

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install pnpm
        run: npm install -g pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev

      - name: install frontend dependencies
        run: pnpm install

      - name: sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Syncing version to $VERSION"
          # Update package.json
          npm version $VERSION --no-git-tag-version --allow-same-version || true
          # Update tauri.conf.json (ubuntu)
          if command -v jq >/dev/null 2>&1; then
            jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          fi
          # Update Cargo.toml (ubuntu)
          if command -v sed >/dev/null 2>&1; then
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/g" src-tauri/Cargo.toml
          fi
        shell: bash

      - name: download onnxruntime (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/resources
          curl -L -o ort.tgz https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-x64-1.22.0.tgz
          tar -xzf ort.tgz onnxruntime-linux-x64-1.22.0/lib/libonnxruntime.so.1.22.0
          mv onnxruntime-linux-x64-1.22.0/lib/libonnxruntime.so.1.22.0 src-tauri/resources/libonnxruntime.so
          rm -rf onnxruntime-linux-x64-1.22.0 ort.tgz



      - name: download onnxruntime (windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir src-tauri/resources -Force
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-win-x64-1.22.0.zip" -OutFile "ort.zip"
          Expand-Archive -Path "ort.zip" -DestinationPath "ort_extracted"
          Move-Item -Path "ort_extracted/onnxruntime-win-x64-1.22.0/lib/onnxruntime.dll" -Destination "src-tauri/resources/onnxruntime.dll"
          Remove-Item -Recurse -Force "ort.zip", "ort_extracted"
        shell: pwsh

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Pitch Analyzer ${{ github.ref_name }}"
          releaseBody: "See assets below."
          releaseDraft: false
          prerelease: false

      - name: Create and Upload Linux Portable tar.gz
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEB_FILE=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -n 1)
          if [ -n "$DEB_FILE" ]; then
            mkdir -p portable_extract && cd portable_extract
            ar x "../$DEB_FILE"
            if [ -f data.tar.xz ]; then
              tar xf data.tar.xz
            elif [ -f data.tar.gz ]; then
              tar xf data.tar.gz
            fi
            tar -czvf ../pitch-analyzer-linux-portable.tar.gz usr/
            cd ..
            gh release upload ${{ github.ref_name }} pitch-analyzer-linux-portable.tar.gz --clobber
          fi
        shell: bash
